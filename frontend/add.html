<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChordWiki - 新規追加</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f7f7f7;
    }
    #container {
      width: 100%;
      max-width: 640px;
      padding: 24px;
      background-color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
    }
    .field {
      margin-bottom: 16px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 140px;
      resize: vertical;
    }
    #button-row {
      display: flex;
      gap: 12px;
      justify-content: flex-start;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button[type="submit"] {
      background-color: #0078d4;
      color: #fff;
    }
    button[type="button"] {
      background-color: #f2f2f2;
      color: #333;
    }
    #message {
      margin-top: 16px;
      min-height: 24px;
    }
    #message.error {
      color: #c00;
    }
    #message.success {
      color: #067d16;
    }
  </style>
</head>
<body>
  <div id="container">
    <h1>新規追加</h1>
    <form id="add-form">
      <div class="field">
        <label for="title">曲名</label>
        <input type="text" id="title" name="title" required>
      </div>
      <div class="field">
        <label for="slug">URL用ID</label>
        <input type="text" id="slug" name="slug" required>
      </div>
      <div class="field">
        <label for="artist">アーティスト</label>
        <input type="text" id="artist" name="artist" required>
      </div>
      <div class="field">
        <label for="tags">タグ</label>
        <textarea id="tags" name="tags" required placeholder="1行に1タグずつ入力してください"></textarea>
      </div>
      <div class="field">
        <label for="chordPro">本文</label>
        <textarea id="chordPro" name="chordPro" required></textarea>
      </div>
      <div id="button-row">
        <button type="submit">登録</button>
        <button type="button" id="cancel-button">キャンセル</button>
      </div>
      <div id="message"></div>
    </form>
  </div>
  <script src="js/add.js"></script>
</body>
</html>
