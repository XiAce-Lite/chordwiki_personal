<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Chord sheet logo</title>
  <desc id="desc">A tilted chord sheet showing C, G and Am.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eef3fb" />
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8e0ec" />
      <stop offset="100%" stop-color="#b8c5d9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#203554" flood-opacity="0.25" />
    </filter>
  </defs>

  <circle cx="64" cy="64" r="54" fill="#f8fbff" stroke="#5e7699" stroke-width="3.2" />
  <circle cx="64" cy="64" r="49" fill="none" stroke="#d6e3f3" stroke-width="1.6" />

  <g transform="translate(27 17)" filter="url(#shadow)">
    <g transform="scale(0.81) rotate(-9 44 50)">
      <path d="M0 18L14 0v18z" fill="url(#fold)" />
      <rect x="0" y="18" width="82" height="86" rx="4" fill="url(#paper)" />
      <path d="M0 18L14 0h64a4 4 0 0 1 4 4v14z" fill="#fbfdff" />
      <path d="M14 0v12a6 6 0 0 1-6 6H0" fill="#c7d2e3" />

      <text x="40" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#131a26">C</text>
      <text x="40" y="54" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#131a26">G</text>
      <text x="40" y="74" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#131a26">Am</text>

      <path d="M13 44h55M13 64h55M13 84h55M13 94h55" stroke="#607da6" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>
</svg>
