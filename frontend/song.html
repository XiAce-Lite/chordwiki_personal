<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChordWiki - Song</title>
  <link rel="stylesheet" href="css/chordwiki-song.css" />
</head>
<body>
  <div class="container">
    <div class="song-header">
      <a href="/" class="back-link">← Top</a>
      <h1 id="title" class="song-title"></h1>
    </div>

    <div id="artist" class="song-artist"></div>
    <div id="key" class="song-key"></div>

    <div class="control-row">
      <div id="transpose-ui" class="transpose-ui">
        <button id="transpose-down" type="button">-</button>
        <span id="transpose-display">Transpose: 0</span>
        <button id="transpose-up" type="button">+</button>
        <button id="transpose-reset" type="button">Reset</button>
      </div>

      <div id="autoscroll-ui" class="autoscroll-ui" aria-label="Auto scroll controls">
        <div class="autoscroll-title">Auto Scroll</div>

        <div class="autoscroll-duration">
          <label for="autoscroll-minutes">
            Min
            <input id="autoscroll-minutes" type="number" min="0" max="999" step="1" value="4" inputmode="numeric" />
          </label>
          <span class="autoscroll-separator">:</span>
          <label for="autoscroll-seconds" aria-label="Seconds">
            <input id="autoscroll-seconds" type="number" min="0" max="59" step="1" value="0" inputmode="numeric" aria-label="Seconds" />
          </label>
        </div>

        <div class="autoscroll-presets" aria-label="Duration presets">
          <span class="autoscroll-presets-label">Preset</span>
          <button class="autoscroll-preset" type="button" data-duration-sec="210">3:30</button>
          <button class="autoscroll-preset is-active" type="button" data-duration-sec="240">4:00</button>
          <button class="autoscroll-preset" type="button" data-duration-sec="300">5:00</button>
        </div>

        <div class="autoscroll-buttons">
          <button id="autoscroll-toggle" type="button">Start</button>
          <button id="autoscroll-reset" type="button">Reset</button>
          <button id="autoscroll-save" type="button">Save</button>
        </div>

        <div id="autoscroll-status" class="autoscroll-status" aria-live="polite"></div>
      </div>
    </div>

    <div class="sheet-stage">
      <div id="sheet" class="cw-sheet"></div>
      <div id="autoscroll-marker-layer" class="autoscroll-marker-layer" aria-hidden="true"></div>
    </div>
  </div>

  <script src="js/chordwiki-render.js"></script>
  <script src="js/song.js"></script>
</body>
</html>
