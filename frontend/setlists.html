<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>セットリスト | ChordWiki Personal</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/favicon-dark.svg" type="image/svg+xml" sizes="any" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="css/setlists.css?v=20260505-setlists1">
</head>
<body class="setlists-page">
  <div class="setlists-layout">
    <header class="setlists-header">
      <a href="/" class="setlists-home-link">← Top</a>
      <h1 class="setlists-title">セットリスト管理</h1>
      <button id="setlists-create" type="button" class="cw-button cw-button-primary">+ 新規作成</button>
    </header>

    <main class="setlists-main">
      <section class="setlists-sidebar">
        <h2 class="setlists-section-title">セットリスト</h2>
        <select id="setlists-selector" class="setlists-select" size="12"></select>
        <div class="setlists-toolbar">
          <button id="setlists-rename" type="button" class="cw-button">名前を保存</button>
          <button id="setlists-delete" type="button" class="cw-button">削除</button>
        </div>
      </section>

      <section class="setlists-content">
        <div id="setlists-empty" class="setlists-empty" hidden>
          セットリストがありません
          <div style="margin-top:10px;">
            <button id="setlists-empty-create" type="button" class="cw-button cw-button-primary">新規セットリストを作成</button>
          </div>
        </div>

        <div id="setlists-detail">
          <div class="setlists-name-row">
            <input id="setlists-name" class="setlists-name-input" type="text" maxlength="80" placeholder="セットリスト名">
            <span id="setlists-song-count"></span>
          </div>
          <ul id="setlists-song-list" class="setlists-song-list"></ul>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="js/runtime-config.js?v=20260410-refactor1"></script>
  <script src="js/shared/api.js?v=20260410-refactor1"></script>
  <script src="js/shared/setlists.js?v=20260506-setlistssync1"></script>
  <script src="js/shared/setlist-ui.js?v=20260506-setlistssync1"></script>
  <script src="js/auth.js?v=20260410-refactor1"></script>
  <script src="js/setlists.js?v=20260506-setlistssync1"></script>
</body>
</html>
