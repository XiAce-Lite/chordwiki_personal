<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ChordWiki Editor Mock (Compact Single Pane)</title>

<style>
  body {
    margin: 0;
    padding: 20px;
    background: #f4f7fb;
    font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", sans-serif;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    padding: 20px 24px;
    border-radius: 8px;
    box-sizing: border-box;
  }

  /* ---- 上部ペイン（縦間隔を詰めた版） ---- */

  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 2px; /* ← さらに詰めた */
    color: #333;
  }

  input[type="text"],
  #tags {
    width: 100%;
    padding: 4px 6px; /* ← 高さを詰めた */
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    margin-bottom: 8px; /* ← フィールド間も詰めた */
    box-sizing: border-box;
  }

  /* タグは 1 行 input */
  #tags {
    height: 28px; /* 明確に1行固定 */
    overflow: hidden;
  }

  /* YouTube は 3 行固定 + スクロール */
  #youtube {
    width: 100%;
    height: 60px; /* 3行相当 */
    padding: 4px 6px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: none;
    overflow-y: scroll;
    margin-bottom: 8px;
    box-sizing: border-box;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  /* ---- 下部 2 ペイン ---- */

  .editor-preview-wrapper {
    display: flex;
    gap: 20px;
    height: 60vh;
    margin-top: 16px;
  }

  .editor-pane,
  .preview-pane {
    flex: 1;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
  }

  #chordPro {
    flex: 1;
    margin: 10px;
    padding: 10px;
    font-family: "メイリオ", "Meiryo", MeiryoFont, sans-serif !important;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: none;
    outline: none;
    box-sizing: border-box;
  }

  .preview-content {
    flex: 1;
    margin: 10px;
    padding: 10px;
    background: #fafafa;
    border: 1px solid #ccc;
    border-radius: 4px;
    overflow-y: auto;
    box-sizing: border-box;
  }
</style>
</head>

<body>

<div class="container">

  <h2>コード譜フォーム（モック）</h2>
  <p style="color:#666; font-size:13px;">※レイアウト確認用。JS は動作しません。</p>

  <!-- 上部：1 ペイン縦並び（間隔詰め版） -->
  <label for="title">曲名</label>
  <input type="text" id="title" value="Pain">

  <label for="artist">アーティスト</label>
  <input type="text" id="artist" value="Anthem">

  <label for="slug">URL用ID</label>
  <input type="text" id="slug" value="Pain">

  <label for="tags">タグ（カンマ区切り）</label>
  <input type="text" id="tags" value="Rock, Anthem">

  <label for="youtube">YouTube URL（複数可）</label>
  <textarea id="youtube">kZZstk3dGvQ
kZZstk3dGvQ?t=42
https://youtu.be/abc123?t=10
https://www.youtube.com/watch?v=xyz999</textarea>

  <!-- 下部：本文 + プレビュー -->
  <div class="editor-preview-wrapper">

    <div class="editor-pane">
      <textarea id="chordPro">
{t:Pain}
{st:歌:Anthem}
| [Fm]---- | [Db]----[Eb]---- |
      </textarea>
    </div>

    <div class="preview-pane">
      <div class="preview-content">
        （ここにプレビューが入る想定）
      </div>
    </div>

  </div>

</div>

</body>
</html>
